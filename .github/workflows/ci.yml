name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  detect:
    name: Detect project type
    runs-on: ubuntu-latest
    outputs:
      node: ${{ steps.check.outputs.node }}
      python: ${{ steps.check.outputs.python }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          echo "node=$( [ -f package.json ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "python=$( [ -f requirements.txt ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

  node:
    name: Node.js CI
    needs: detect
    if: needs.detect.outputs.node == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npm run typecheck --if-present

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build --if-present

  python:
    name: Python CI
    needs: detect
    if: needs.detect.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Lint
        run: |
          pip install ruff
          ruff check .

      - name: Test
        run: |
          pip install pytest
          pytest --tb=short || echo "No tests found"
